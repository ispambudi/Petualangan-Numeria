        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext; // [cite: 214, 215]
                if (!AudioContext) return; // [cite: 215]
                const ctx = new AudioContext(); // [cite: 215]
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'correct') {
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.stop(ctx.currentTime + 0.4);
                }
            } catch (e) {
                console.log("AudioContext disekat atau tidak disokong"); // [cite: 215]
            }
        };

            let i = 0;
            while(res.size < 4 && i < fallbacks.length) { res.add(fallbacks[i]); i++; } // [cite: 236]
            return Array.from(res); // [cite: 236]
        };

                    q = `BOSS KRISTAL: (${num1}/${den1} + ${num2}/${den2}) x ${num3}/${den3} = ... (Sederhanakan)?`; // [cite: 342]
                    let numSum = num1 * den2 + num2 * den1, denSum = den1 * den2; ans = simplify(numSum * num3, denSum * den3); // [cite: 343]
                } else {
                    let num1 = rand(1,3), den1 = 4, num2 = rand(1,2), den2 = 2, num3 = rand(1,2), den3 = 3; // [cite: 344]
                    q = `BOSS KRISTAL: ${num1}/${den1} : (${num2}/${den2} x ${num3}/${den3}) = ... (Sederhanakan)?`; // [cite: 345]
                    let numMult = num2 * num3, denMult = den2 * den3; ans = simplify(num1 * denMult, den1 * numMult); // [cite: 345, 346]
                }

            } else if (level === 31) { // Aljabar [cite: 346, 347]

                } else if (type === 1) { let b = rand(2, 30); let c = x + b; q = `Buka Segel: Jika x + ${b} = ${c}, berapakah nilai x?`; ans = x; // [cite: 350, 351, 352]
                } else { let b = rand(2, 30); let c = x - b; q = `Buka Segel: Jika x - ${b} = ${c}, berapakah nilai x?`; ans = x; } // [cite: 352, 353]

                } else { let c = a * x - b; q = `Retas Sirkuit: Jika ${a}x - ${b} = ${c}, berapakah nilai x?`; ans = x; } // [cite: 358, 359]

                q = `Pasar Gurun: Jika harga ${a} ${itemA} adalah ${totalB1} ${itemB}, berapakah harga untuk ${a2} ${itemA}?`; ans = a2 * pricePerUnit; // [cite: 363]
            } else if (level === 34) { // [cite: 364]

            } else if (level === 38) { // [cite: 387]
                let triples = [[3,4,5], [5,12,13], [6,8,10], [9,12,15], [8,15,17]]; // [cite: 387]
                let [a, t, c] = triples[rand(0, triples.length - 1)]; let mult = rand(2, 6); a *= mult; t *= mult; c *= mult; // [cite: 388, 389]
                if (rand(0, 1) === 0) { q = `Menara Segitiga Siku-Siku: Jika panjang alas penopang ${a} m, tinggi menara ${t} m, dan sisi miring baja ${c} m, berapakah LUAS menara segitiga tersebut?`; ans = (a * t) / 2; // [cite: 389, 390]
                } else { q = `Menara Segitiga Siku-Siku: Jika panjang alas penopang ${a} m, tinggi menara ${t} m, dan sisi miring baja ${c} m, berapakah panjang KELILING penyangga luarnya?`; ans = a + t + c; } // [cite: 390, 391]
            } else if (level === 39) { // [cite: 391]

                let conf = configs[rand(0, configs.length - 1)]; let mult = rand(2, 5); // [cite: 392]
                let a = conf.a * mult, b = conf.b * mult, t = conf.t * mult, s = conf.s * mult; // [cite: 393]
                if (rand(0, 1) === 0) { q = `Taman Trapesium Sama Kaki: Panjang dua sisi yang sejajar adalah ${a} m dan ${b} m. Jika tinggi taman ${t} m (dan sisi miring ${s} m), berapakah LUAS taman istana tersebut?`; ans = ((a + b) * t) / 2; // [cite: 394, 395, 396]
                } else { q = `Taman Trapesium Sama Kaki: Panjang dua sisi yang sejajar adalah ${a} m dan ${b} m, dengan panjang dua sisi miring yang masing-masing ${s} m. Berapakah panjang KELILING pagar yang dibutuhkan?`; ans = a + b + s + s; } // [cite: 396, 397, 398]

            }

            // Generate Opsi Pilihan Otomatis untuk tipe angka numerik bulat biasa
            if (options.length === 0) { // [cite: 404]
                let ansNum = parseInt(ans);
                let scale = 1; if (Math.abs(ansNum) > 100) scale = 10; if (Math.abs(ansNum) > 1000) scale = 100; // [cite: 404, 405]
                let setFake = new Set([ansNum]);

                    let fake = ansNum + rand(-5, 5) * scale;
                    if (fake !== ansNum) setFake.add(fake);
                }
                options = Array.from(setFake).map(v => String(v));
                ans = String(ansNum);
            }

            return { question: q, answer: ans, options: shuffle(options) }; //

                        {/* HALAMAN 3: BATTLE ARENA */}
                        {currentPage === 'GAME' && questions.length > 0 && (
                            <div className={`p-4 h-full flex flex-col justify-between transition-transform duration-100 ${isShake ? 'animate-bounce' : ''}`}>
                                
                                {/* Medan Tempur RPG Visual */}
                                <div className="bg-gradient-to-b from-slate-950 to-slate-900 rounded-2xl border-2 border-slate-800 p-4 shadow-xl flex flex-col justify-between h-44 relative">
                                    <div className="absolute top-2 right-2 flex items-center gap-0.5 bg-slate-900/90 border border-slate-800 px-2 py-0.5 rounded-full text-[10px]">
                                        <span className="text-slate-400">Soal:</span>
                                        <span className="font-bold text-amber-400 font-mono">{currentQIndex + 1}/3</span>
                                    </div>

                                    {/* Bar Nyawa Monster & Hero */}
                                    <div className="grid grid-cols-2 gap-4">
                                        {/* Hero HP */}
                                        <div className="space-y-1">
                                            <div className="flex justify-between items-center text-[10px] font-bold">
                                                <span className="text-slate-300 truncate">{hero.name}</span>
                                                <div className="flex gap-0.5">
                                                    {[...Array(3)].map((_, i) => (
                                                        <i key={i} data-lucide="heart" className={`w-3 h-3 ${i < hearts ? 'text-rose-500 fill-rose-500' : 'text-slate-700'}`}></i>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-gradient-to-r from-emerald-500 to-green-400 h-full transition-all" style={{width: `${(hearts/3)*100}%`}}></div>
                                            </div>
                                        </div>

                                        {/* Monster HP */}
                                        <div className="space-y-1">
                                            <div className="flex justify-between items-center text-[10px] font-bold">
                                                <span className="text-rose-400 truncate">{currentEnemy.name}</span>
                                                <span className="font-mono text-rose-300">{enemyHealth}%</span>
                                            </div>
                                            <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-gradient-to-r from-rose-500 to-red-600 h-full transition-all" style={{width: `${enemyHealth}%`}}></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Duel Animasi Sprite Emoji */}
                                    <div className="flex justify-around items-center my-2 flex-1">
                                        <div className="text-4xl animate-pulse transform scale-x-[-1]">{hero.emoji}</div>
                                        <div className="text-xs font-black px-2 py-1 bg-slate-800 rounded-md text-amber-400 font-mono border border-slate-700 shadow-sm">VS</div>
                                        <div className="text-4xl animate-bounce">{currentEnemy.emoji}</div>
                                    </div>

                                    <div className="text-center text-[10px] text-slate-400 italic font-medium truncate">
                                        {currentEnemy.desc || "Monster menghalangi jalanmu, selesaikan hitungan!"}
                                    </div>
                                </div>

                                {/* Area Soal & Pertanyaan Utama */}
                                {gameStatus === 'playing' && (
                                    <div className="flex-1 flex flex-col justify-center my-4 space-y-4">
                                        <div className="bg-slate-950 rounded-xl border border-slate-800 p-4 text-center shadow-inner min-h-[70px] flex items-center justify-center">
                                            <p className="text-sm font-bold text-slate-100 leading-relaxed font-mono">
                                                {questions[currentQIndex].question}
                                            </p>
                                        </div>

                                        {/* Pilihan Ganda Grid */}
                                        <div className="grid grid-cols-2 gap-2.5">
                                            {questions[currentQIndex].options.map((opt, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => handleAnswer(opt)}
                                                    className="p-3 bg-slate-950 border border-slate-800 rounded-xl font-mono text-xs font-bold text-slate-200 shadow hover:bg-slate-900 active:scale-95 transition-all text-center hover:border-slate-600"
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Layar Modals Status Hasil Pertempuran */}
                                {gameStatus !== 'playing' && (
                                    <div className="flex-1 flex flex-col items-center justify-center my-6 p-4 rounded-2xl bg-slate-950/90 border border-slate-800 shadow-2xl text-center space-y-4">
                                        {gameStatus === 'won' ? (
                                            <>
                                                <div className="w-12 h-12 bg-amber-500/10 rounded-full flex items-center justify-center text-amber-400 border border-amber-500/30">
                                                    <i data-lucide="trophy" className="w-6 h-6"></i>
                                                </div>
                                                <div>
                                                    <h2 className="text-base font-black uppercase text-amber-400 tracking-wider">Kemenangan Gemilang!</h2>
                                                    <p className="text-[11px] text-slate-400 mt-1">Musuh berhasil dikalahkan dan gerbang sihir terbuka.</p>
                                                </div>
                                                <div className="bg-slate-900 p-3 rounded-xl border border-slate-800 w-full max-w-[240px] grid grid-cols-2 gap-2 text-xs font-mono">
                                                    <div className="text-blue-400 font-bold">+50 XP</div>
                                                    <div className="text-amber-400 font-bold">+30 Koin</div>
                                                </div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="w-12 h-12 bg-rose-500/10 rounded-full flex items-center justify-center text-rose-400 border border-rose-500/30">
                                                    <i data-lucide="skull" className="w-6 h-6"></i>
                                                </div>
                                                <div>
                                                    <h2 className="text-base font-black uppercase text-rose-500 tracking-wider">Kamu Gugur!</h2>
                                                    <p className="text-[11px] text-slate-400 mt-1">Kekuatan perhitunganmu runtuh dihantam musuh.</p>
                                                </div>
                                            </>
                                        )}

                                        <div className="flex gap-2 w-full max-w-[260px] pt-2">
                                            <button 
                                                onClick={() => startNewBattle(activeLevel)}
                                                className="flex-1 py-2 rounded-xl text-xs font-bold bg-slate-900 border border-slate-700 text-slate-200 hover:bg-slate-800 flex items-center justify-center gap-1.5 shadow"
                                            >
                                                <i data-lucide="refresh-cw" className="w-3.5 h-3.5"></i> Ulangi
                                            </button>
                                            <button 
                                                onClick={() => { playSound('click'); setCurrentPage('REGION'); }}
                                                className="flex-1 py-2 rounded-xl text-xs font-bold bg-gradient-to-r from-amber-500 to-orange-600 text-white hover:brightness-110 flex items-center justify-center gap-1.5 shadow-md"
                                            >
                                                Peta Level <i data-lucide="arrow-right" className="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}

                            </div>
                        )}

                    </div>

                    {/* Bottom Navigation Menu Footer Bar */}
                    <div className="bg-slate-950 p-2 border-t border-slate-800 grid grid-cols-2 gap-2 z-10">
                        <button 
                            onClick={() => { playSound('click'); setCurrentPage('MAP'); }}
                            className={`py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 ${
                                currentPage === 'MAP' 
                                ? 'bg-slate-900 border border-slate-700 text-amber-400 shadow-inner' 
                                : 'text-slate-400 hover:text-white'
                            }`}
                        >
                            <i data-lucide="map" className="w-4 h-4"></i> Peta Dunia
                        </button>
                        <button 
                            disabled={!activeRegion}
                            onClick={() => { playSound('click'); setCurrentPage('REGION'); }}
                            className={`py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 ${
                                !activeRegion ? 'opacity-30 pointer-events-none' : ''
                            } ${
                                currentPage === 'REGION' 
                                ? 'bg-slate-900 border border-slate-700 text-amber-400 shadow-inner' 
                                : 'text-slate-400 hover:text-white'
                            }`}
                        >
                            <i data-lucide="layers" className="w-4 h-4"></i> Peta Level
                        </button>
                    </div>

                </div>
            );
        }

        // Render aplikasi ke DOM elemen root
        const root = ReactRoot = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
